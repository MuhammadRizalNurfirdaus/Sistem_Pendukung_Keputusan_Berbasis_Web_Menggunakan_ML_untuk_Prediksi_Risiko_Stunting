# Docker Compose untuk menjalankan Prometheus + Grafana
# =====================================================
# Cara pakai:
#   1. Pastikan Docker Desktop sudah berjalan
#   2. Jalankan FastAPI server terlebih dahulu: uvicorn main:app --host 0.0.0.0 --port 8000
#   3. Lalu jalankan monitoring: docker compose -f docker-compose.monitoring.yml up -d
#   4. Buka Grafana di browser: http://localhost:3000 (user: admin, password: admin)
#   5. Import dashboard dari file monitoring/grafana-dashboard.json
#
# Untuk berhenti:
#   docker compose -f docker-compose.monitoring.yml down

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: stunting-prometheus
    ports:
      - "9090:9090"                   # Akses Prometheus UI di http://localhost:9090
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml  # Konfigurasi
      - prometheus_data:/prometheus   # Simpan data agar tidak hilang saat restart
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Agar bisa akses FastAPI di host
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: stunting-grafana
    ports:
      - "3000:3000"                   # Akses Grafana di http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana   # Simpan data dashboard agar persisten
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
